<!DOCTYPE html>
<html>
<head>
<title>Finance Tracker Pro</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>💰 Finance Tracker</h1>

<div class="summary">

<div class="card">
<h3>Balance</h3>
<p id="balance">₹0</p>
</div>

<div class="card income">
<h3>Income</h3>
<p id="income">₹0</p>
</div>

<div class="card expense">
<h3>Expense</h3>
<p id="expense">₹0</p>
</div>

</div>

<h2>Add Transaction</h2>

<form id="form">

<input type="text" id="text" placeholder="Description" required>

<input type="number" id="amount" placeholder="Amount (+income / -expense)" required>

<select id="category">
<option>Food</option>
<option>Travel</option>
<option>Shopping</option>
<option>Salary</option>
<option>Other</option>
</select>

<button>Add</button>

</form>

<h2>Transactions</h2>

<ul id="list"></ul>

<h2>Expense Chart</h2>

<canvas id="myChart"></canvas>
<h2>Export Report</h2>
<button onclick="exportCSV()">Download CSV Report</button>

</div>

<script src="script.js"></script>

</body>
</html>
